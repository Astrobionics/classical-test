<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Классическая живопись</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
    }

    .answer-btn {
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    img {
      -webkit-user-drag: none;
      user-select: none;
    }

    .hero-bg {
      background-image:
        linear-gradient(to bottom, rgba(9, 9, 11, 0.45), rgba(9, 9, 11, 0.78)),
        url("../service/HeaderArt.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-2 py-3 md:px-3 md:py-4">
    <header id="pageHeader" class="text-center mb-4">
      <div class="flex justify-center mb-3">
        <a href="../" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl px-5 py-3 text-sm">
          ← К выбору раздела
        </a>
      </div>

      <div class="hero-bg rounded-3xl border border-zinc-800 shadow-2xl overflow-hidden">
        <div class="px-5 py-10 md:px-8 md:py-12">
          <h1 class="text-3xl md:text-5xl font-bold tracking-tight">Классическая живопись</h1>
        </div>
      </div>
    </header>

    <div id="compactQuizTitle" class="hidden text-center mb-3">
      <div class="flex justify-center mb-2">
        <a href="../" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-xl px-3 py-1.5 text-sm">
          ← К выбору раздела
        </a>
      </div>
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Классическая живопись</h1>
    </div>

    <main class="bg-zinc-900 border border-zinc-800 rounded-3xl shadow-2xl p-3 md:p-4">
      <section id="startScreen">
        <div class="max-w-2xl mx-auto">
          <h2 class="text-2xl font-semibold mb-4 text-center">Выбор сложности</h2>
          <p class="text-zinc-400 text-center mb-8 text-sm md:text-base">
            В каждом тесте 10 вопросов. Если доступных картин меньше 10, повторы допустимы.
          </p>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <button class="difficulty-btn bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl p-5 text-left" data-difficulty="easy">
              <div class="text-xl font-semibold mb-2">Лёгкий</div>
              <div class="text-sm text-zinc-400">Вопросы только из easy. Неверные варианты — из всех банков.</div>
            </button>

            <button class="difficulty-btn bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl p-5 text-left" data-difficulty="medium">
              <div class="text-xl font-semibold mb-2">Средний</div>
              <div class="text-sm text-zinc-400">Вопросы из easy + medium.</div>
            </button>

            <button class="difficulty-btn bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl p-5 text-left" data-difficulty="hard">
              <div class="text-xl font-semibold mb-2">Сложный</div>
              <div class="text-sm text-zinc-400">Вопросы из medium + hard.</div>
            </button>
          </div>

          <div id="startError" class="hidden bg-red-950 border border-red-800 text-red-200 rounded-2xl p-3 text-sm"></div>
        </div>
      </section>

      <section id="quizScreen" class="hidden">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2 mb-2">
          <div class="flex flex-wrap items-center gap-2 text-sm">
            <div class="bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1">
              Вопрос: <span id="questionNumber" class="font-semibold">1</span> / 10
            </div>
            <div class="bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1">
              Правильно: <span id="score" class="font-semibold text-emerald-400">0</span>
            </div>
            <div class="bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1">
              Сложность: <span id="difficultyLabel" class="font-semibold">Лёгкий</span>
            </div>
          </div>

          <div class="w-full md:w-44">
            <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
              <div id="progressBar" class="h-full bg-violet-500 w-[10%] transition-all duration-300"></div>
            </div>
          </div>
        </div>

        <div class="bg-zinc-800 border border-zinc-700 rounded-3xl p-2 mb-2">
          <div class="w-full flex justify-center">
            <img
              id="paintingImage"
              src=""
              alt="Картина"
              class="max-h-[30vh] md:max-h-[34vh] w-auto max-w-full rounded-2xl border border-zinc-700 object-contain bg-zinc-900"
            >
          </div>

          <div class="mt-1.5 flex flex-wrap gap-2">
            <button id="nextBtn" class="hidden bg-zinc-700 hover:bg-zinc-600 text-white px-3 py-2 rounded-2xl font-medium text-sm">
              Следующий вопрос
            </button>
          </div>
        </div>

        <div id="answersContainer" class="grid grid-cols-1 gap-1.5 mb-2"></div>
        <div id="feedbackBox" class="hidden rounded-2xl border p-2.5 text-sm"></div>
      </section>

      <section id="resultScreen" class="hidden">
        <div class="max-w-2xl mx-auto text-center">
          <h2 class="text-2xl md:text-3xl font-bold mb-3">Тест завершён</h2>
          <p class="text-lg text-zinc-300 mb-2">
            Результат: <span id="finalScore" class="font-bold text-emerald-400">0</span> / 10
          </p>
          <p id="finalComment" class="text-zinc-400 mb-5 text-sm md:text-base"></p>

          <div class="flex flex-col md:flex-row gap-3 justify-center">
            <button id="restartSameBtn" class="bg-violet-600 hover:bg-violet-500 text-white px-5 py-2.5 rounded-2xl font-medium">
              Пройти ещё раз
            </button>

            <a href="../" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-white px-5 py-2.5 rounded-2xl font-medium">
              К выбору раздела
            </a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="../data/art-items.js"></script>
  <script>
    const TEST_LENGTH = 10;

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const startError = document.getElementById("startError");
    const pageHeader = document.getElementById("pageHeader");
    const compactQuizTitle = document.getElementById("compactQuizTitle");

    const questionNumberEl = document.getElementById("questionNumber");
    const scoreEl = document.getElementById("score");
    const difficultyLabelEl = document.getElementById("difficultyLabel");
    const progressBarEl = document.getElementById("progressBar");

    const paintingImage = document.getElementById("paintingImage");
    const nextBtn = document.getElementById("nextBtn");
    const answersContainer = document.getElementById("answersContainer");
    const feedbackBox = document.getElementById("feedbackBox");

    const finalScoreEl = document.getElementById("finalScore");
    const finalCommentEl = document.getElementById("finalComment");
    const restartSameBtn = document.getElementById("restartSameBtn");

    const difficultyButtons = document.querySelectorAll(".difficulty-btn");

    const ITEM_BANKS = window.ART_ITEM_BANKS || { easy: [], medium: [], hard: [] };

    let currentDifficulty = null;
    let currentQuestionIndex = 0;
    let score = 0;
    let currentQuestion = null;
    let awaitingNext = false;
    let preparedQuestions = [];

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sampleOne(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function getQuestionPool(difficulty) {
      if (difficulty === "easy") return [...ITEM_BANKS.easy];
      if (difficulty === "medium") return [...ITEM_BANKS.easy, ...ITEM_BANKS.medium];
      if (difficulty === "hard") return [...ITEM_BANKS.medium, ...ITEM_BANKS.hard];
      return [];
    }

    function getWrongPool(difficulty) {
      if (difficulty === "easy") return [...ITEM_BANKS.easy, ...ITEM_BANKS.medium, ...ITEM_BANKS.hard];
      if (difficulty === "medium") return [...ITEM_BANKS.easy, ...ITEM_BANKS.medium];
      if (difficulty === "hard") return [...ITEM_BANKS.medium, ...ITEM_BANKS.hard];
      return [];
    }

    function getDifficultyLabel(difficulty) {
      if (difficulty === "easy") return "Лёгкий";
      if (difficulty === "medium") return "Средний";
      if (difficulty === "hard") return "Сложный";
      return "";
    }

    function showScreen(screen) {
      startScreen.classList.add("hidden");
      quizScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      screen.classList.remove("hidden");
    }

    function setFeedback(type, text) {
      feedbackBox.classList.remove("hidden");
      feedbackBox.textContent = text;

      if (type === "correct") {
        feedbackBox.className = "rounded-2xl border p-2.5 text-sm bg-emerald-950 border-emerald-700 text-emerald-200";
      } else {
        feedbackBox.className = "rounded-2xl border p-2.5 text-sm bg-red-950 border-red-700 text-red-200";
      }
    }

    function hideFeedback() {
      feedbackBox.classList.add("hidden");
      feedbackBox.textContent = "";
    }

    function updateHeader() {
      questionNumberEl.textContent = String(currentQuestionIndex + 1);
      scoreEl.textContent = String(score);
      difficultyLabelEl.textContent = getDifficultyLabel(currentDifficulty);
      progressBarEl.style.width = (((currentQuestionIndex + 1) / TEST_LENGTH) * 100) + "%";
    }

    function buildTestSequence(pool, length) {
      if (pool.length >= length) {
        return shuffle(pool).slice(0, length);
      }

      const result = shuffle(pool);
      while (result.length < length) {
        result.push(sampleOne(pool));
      }
      return result;
    }

    function createQuestion(correctItem) {
      const wrongPool = getWrongPool(currentDifficulty);

      const wrongAnswers = [];
      const usedAuthorKeys = new Set([correctItem.authorKey]);

      const shuffledPool = shuffle(
        wrongPool.filter(item => item.file !== correctItem.file)
      );

      for (const item of shuffledPool) {
        if (usedAuthorKeys.has(item.authorKey)) {
          continue;
        }

        usedAuthorKeys.add(item.authorKey);
        wrongAnswers.push({
          author: item.author,
          authorKey: item.authorKey,
          isCorrect: false
        });

        if (wrongAnswers.length === 2) {
          break;
        }
      }

      if (wrongAnswers.length < 2) {
        throw new Error("Для выбранной сложности нужно минимум 3 разных автора.");
      }

      const answers = shuffle([
        {
          author: correctItem.author,
          authorKey: correctItem.authorKey,
          isCorrect: true
        },
        ...wrongAnswers
      ]);

      return {
        image: correctItem.file,
        correctAuthor: correctItem.author,
        correctAuthorKey: correctItem.authorKey,
        correctFullLabel: correctItem.displayFull,
        answers
      };
    }

    function renderAnswers(question) {
      answersContainer.innerHTML = "";

      question.answers.forEach(answer => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = answer.author;
        button.dataset.authorKey = answer.authorKey;
        button.className = "answer-btn w-full text-left bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl px-3 py-2 text-sm";
        button.addEventListener("click", () => handleAnswerClick(answer));
        answersContainer.appendChild(button);
      });
    }

    function disableAnswers() {
      answersContainer.querySelectorAll("button").forEach(button => {
        button.disabled = true;
      });
    }

    function highlightAnswers(selectedAnswer) {
      answersContainer.querySelectorAll("button").forEach(button => {
        const authorKey = button.dataset.authorKey;

        if (authorKey === currentQuestion.correctAuthorKey) {
          button.className = "answer-btn w-full text-left bg-emerald-950 border border-emerald-600 rounded-2xl px-3 py-2 text-sm";
        } else if (authorKey === selectedAnswer.authorKey) {
          button.className = "answer-btn w-full text-left bg-red-950 border border-red-600 rounded-2xl px-3 py-2 text-sm";
        } else {
          button.className = "answer-btn w-full text-left bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-2 text-sm opacity-70";
        }
      });
    }

    function loadQuestion() {
      awaitingNext = false;
      nextBtn.classList.add("hidden");
      hideFeedback();
      updateHeader();

      const correctItem = preparedQuestions[currentQuestionIndex];
      currentQuestion = createQuestion(correctItem);

      paintingImage.src = "../" + currentQuestion.image;
      paintingImage.alt = currentQuestion.correctFullLabel;

      renderAnswers(currentQuestion);
    }

    function startTest(difficulty) {
      currentDifficulty = difficulty;
      currentQuestionIndex = 0;
      score = 0;
      startError.classList.add("hidden");
      startError.textContent = "";

      try {
        const questionPool = getQuestionPool(difficulty);
        const wrongPool = getWrongPool(difficulty);

        if (questionPool.length === 0) {
          throw new Error("В этой сложности пока нет изображений.");
        }

        const uniqueAuthors = new Set(wrongPool.map(item => item.authorKey));
        if (uniqueAuthors.size < 3) {
          throw new Error("Для запуска теста нужно минимум 3 разных автора.");
        }

        preparedQuestions = buildTestSequence(questionPool, TEST_LENGTH);
        pageHeader.classList.add("hidden");
        compactQuizTitle.classList.remove("hidden");
        showScreen(quizScreen);
        loadQuestion();
      } catch (error) {
        startError.textContent = error.message;
        startError.classList.remove("hidden");
      }
    }

    function handleAnswerClick(selectedAnswer) {
      if (awaitingNext) return;

      awaitingNext = true;
      disableAnswers();
      highlightAnswers(selectedAnswer);

      if (selectedAnswer.authorKey === currentQuestion.correctAuthorKey) {
        score += 1;
        scoreEl.textContent = String(score);
        setFeedback("correct", `Верно. ${currentQuestion.correctFullLabel}`);
      } else {
        setFeedback("wrong", `Неверно. Правильный ответ: ${currentQuestion.correctFullLabel}`);
      }

      nextBtn.classList.remove("hidden");
    }

    function finishTest() {
      finalScoreEl.textContent = String(score);

      if (score === 10) {
        finalCommentEl.textContent = "Идеально. Все ответы верные.";
      } else if (score >= 8) {
        finalCommentEl.textContent = "Очень сильный результат.";
      } else if (score >= 5) {
        finalCommentEl.textContent = "Неплохо. Уже есть база.";
      } else {
        finalCommentEl.textContent = "Можно пройти ещё раз и улучшить результат.";
      }

      showScreen(resultScreen);
    }

    function goToNextQuestion() {
      if (currentQuestionIndex >= TEST_LENGTH - 1) {
        finishTest();
        return;
      }

      currentQuestionIndex += 1;
      loadQuestion();
    }

    difficultyButtons.forEach(button => {
      button.addEventListener("click", () => startTest(button.dataset.difficulty));
    });

    nextBtn.addEventListener("click", goToNextQuestion);

    restartSameBtn.addEventListener("click", () => {
      pageHeader.classList.add("hidden");
      compactQuizTitle.classList.remove("hidden");
      startTest(currentDifficulty);
    });
  </script>
</body>
</html>
